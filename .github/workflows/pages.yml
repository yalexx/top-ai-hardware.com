name: Deploy Pages
on:
  push:
    branches: [main]
permissions:
  pages: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Request Pages build
        run: |
          curl -sf -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages/builds
